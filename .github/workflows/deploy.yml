name: WTSAPI Microservice Deploy - CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: update_files_and_packages
    steps:
      - name: Deploy WTSAPI Microservice
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/blibsend/wtsapi_microservice
            pnpm build
            pm2 restart ecosystem.config.js
            pm2 save

  update_files_and_packages:
    runs-on: ubuntu-latest
    needs: create_enviroment_file
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
      - name: Upate project with git
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/blibsend/wtsapi_microservice
            git pull origin main
            sudo rm -rf node_modules/
            pnpm install

  create_enviroment_file:
    runs-on: ubuntu-latest
    steps:
      - name: Create .env file
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/blibsend/wtsapi_microservice
            sudo cat > .env <<EOL
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            EOL
