name: WTSAPI Microservice Deploy - CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: update_files_and_packages
    steps:
      - name: Deploy WTSAPI Microservice
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/blibsend/wtsapi_microservice
            pnpm build
            pm2 restart ecosystem.config.js
            pm2 save

  update_files_and_packages:
    runs-on: ubuntu-latest
    needs: create_enviroment_file
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
      - name: Upate project with git
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/blibsend/wtsapi_microservice
            git pull origin main
            sudo rm -rf node_modules/
            pnpm install

  create_enviroment_file:
    runs-on: ubuntu-latest
    steps:
      - name: Create .env file
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/blibsend/wtsapi_microservice
            sudo cat > .env <<EOL
            NODE_ENV=production
            WEBSOCKET_PORT=${{ secrets.WEBSOCKET_PORT }}
            RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EMAIL_HOST=${{ secrets.EMAIL_HOST }}
            EMAIL_PORT=${{ secrets.EMAIL_PORT }}
            EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_EMAIL_FROM=${{ secrets.RESEND_EMAIL_FROM }}
            EOL
